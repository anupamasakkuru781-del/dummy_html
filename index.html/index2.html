<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Responsive Template</title>
    <link rel="stylesheet" href="style2.css">
</head>
<body>

   
    <nav class="navbar">
        <div class="logo">MY SITE</div>

        <div class="menu-toggle" onclick="toggleMenu()">
            ☰
         </div>

        <div class="links" id="navlinks">
            <ul>
                <li><a href="#">HOME</a></li>
                <li><a href="#about">ABOUT</a></li>
                <li><a href="#services">SERVICES</a></li>
                <li><a href="#contact">CONTACT</a></li>
            </ul>
        </div>
    </nav>


    <section class="hero">
        <h1>WLECOME TO MY WEBSITE</h1>
        <P>Build responsive website easily</P>
        <button>Get Started</button>
    </section>

    
    <section id="about" class="about">
        <h2>About Us</h2>
        <p>This is a responsive template for all devices.</p>
    </section>

    
    <section id="services" class="services">
        <div class="box">Service 1</div>
        <div class="box">Service 2</div>
        <div class="box">Service 3</div>
    </section>

    
    <section id="contact" class="contact">
        <h2>Contact</h2>
        <form>
            <input type="text" placeholder="Name">
            <input type="text" placeholder="Email">
            <textarea placeholder="Message"></textarea>
            <button>SEND</button>
        </form>
    </section>

    <footer>
        <p>© 2026 Mysite. All rights reserved.</p>
    </footer>

</body>
</html>
