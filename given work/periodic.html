<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Periodic Table</title>

<style>
body{
    font-family: Arial;
    text-align:center;
}

h1{
    margin:20px;
}

table{
    border-collapse:collapse;
    margin:auto;
}

td{
    width:60px;
    height:60px;
    border:1px solid black;
    text-align:center;
    font-size:12px;
    font-weight:bold;
}

/* Colors */
.hydrogen{ background:#ff9999; }
.alkali{ background:#ffcc99; }
.alkaline{ background:#ffff99; }
.transition{ background:#ccffcc; }
.metalloid{ background:#99ccff; }
.nonmetal{ background:#ffccff; }
.noble{ background:#ccccff; }
.lanthanoid{ background:#ffb3e6; }
.actinoid{ background:#ffb3b3; }

.empty{
    border:none;
}
</style>
</head>

<body>

<h1>Periodic Table</h1>

<table>

<tr>
