<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>10x10 Color Pattern Table</title>

<style>
body{
    text-align:center;
    font-family:Arial;
}

h1{
    margin:20px;
}

table{
    border-collapse:collapse;
    margin:auto;
}

td{
    width:60px;
    height:60px;
    border:2px solid black;
}

/* Colors */
.red{ background:red; }
.blue{ background:#2f5fa7; }
.green{ background:#2f8f4e; }
.white{ background:#dcdcdc; }
.yellow{ background:#f4c430; }
.pink{ background:#f06292; }
.pinklight{ background:#f8a5c2; }
.black{ background:#2b2b2b; }

</style>
</head>

<body>

<h1>10x10 Color Pattern Table</h1>

<table>

<!-- Row 1 -->
<tr>
<td class="red"></td><td class="red"></td><td class="red"></td><td class="red"></td><td class="red"></td>
<td class="red"></td><td class="red"></td><td class="red"></td><td class="red"></td><td class="red"></td>
</tr>

<!-- Row 2 -->
<tr>
<td class="blue"></td><td class="blue"></td><td class="blue"></td><td class="blue"></td><td class="blue"></td>
<td class="blue"></td><td class="blue"></td><td class="blue"></td><td class="blue"></td><td class="blue"></td>
</tr>

<!-- Row 3 -->
<tr>
<td class="green"></td><td class="green"></td><td class="green"></td><td class="green"></td><td class="green"></td>
<td class="green"></td><td class="green"></td><td class="green"></td><td class="green"></td><td class="green"></td>
</tr>

<!-- Row 4 -->
<tr>
<td class="red"></td><td class="white"></td><td class="red"></td><td class="white"></td><td class="red"></td>
<td class="white"></td><td class="red"></td><td class="white"></td><td class="red"></td><td class="white"></td>
</tr>

<!-- Row 5 -->
<tr>
<td class="white"></td><td class="red"></td><td class="white"></td><td class="red"></td><td class="white"></td>
<td class="red"></td><td class="white"></td><td class="red"></td><td class="white"></td><td class="red"></td>
</tr>

<!-- Row 6 -->
<tr>
<td class="yellow"></td><td class="green"></td><td class="yellow"></td><td class="green"></td><td class="yellow"></td>
<td class="green"></td><td class="yellow"></td><td class="green"></td><td class="yellow"></td><td class="green"></td>
</tr>

<!-- Row 7 -->
<tr>
<td class="green"></td><td class="yellow"></td><td class="green"></td><td class="yellow"></td><td class="green"></td>
<td class="yellow"></td><td class="green"></td><td class="yellow"></td><td class="green"></td><td class="yellow"></td>
</tr>

<!-- Row 8 -->
<tr>
<td class="pink"></td><td class="pink"></td><td class="pink"></td><td class="pink"></td><td class="pink"></td>
<td class="pink"></td><td class="pinklight"></td><td class="pinklight"></td><td class="pinklight"></td><td class="pinklight"></td>
</tr>

<!-- Row 9 -->
<tr>
<td class="pink"></td><td class="pink"></td><td class="pink"></td><td class="pink"></td><td class="pinklight"></td>
<td class="pinklight"></td><td class="pinklight"></td><td class="pinklight"></td><td class="pink"></td><td class="pink"></td>
</tr>

<!-- Row 10 -->
<tr>
<td class="black"></td><td class="black"></td><td class="black"></td><td class="black"></td><td class="black"></td>
<td class="black"></td><td class="black"></td><td class="black"></td><td class="black"></td><td class="black"></td>
</tr>

</table>

</body>
</html>
