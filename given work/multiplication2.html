<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Multiplication Table</title>
<style>
  body {
    font-family: Verdana, sans-serif;
    text-align: center;
    background: linear-gradient(to right, #eef2f3, #8e9eab);
  }

  h1 {
    margin-top: 20px;
    color: #333;
  }

  table {
    margin: 20px auto;
    border-collapse: collapse;
    box-shadow: 0 0 10px rgba(0,0,0,0.3);
  }

  td, th {
    width: 45px;
    height: 45px;
    text-align: center;
    font-weight: bold;
    border: 1px solid #555;
  }

  th {
    background: #222;
    color: white;
  }

  /* Row colors */
  .r1 { background:#ffb6c1; }
  .r2 { background:#ff9999; }
  .r3 { background:#ffd699; }
  .r4 { background:#ffcc66; }
  .r5 { background:#ffff99; }
  .r6 { background:#ccff99; }
  .r7 { background:#99ffcc; }
  .r8 { background:#66ccff; }
  .r9 { background:#9999ff; }
  .r10 { background:#cc99ff; }
  .r11 { background:#ff99ff; }
  .r12 { background:#ff66cc; }

  /* Diagonal */
  .diag {
    background: white !important;
    color: black;
    border: 2px solid black;
  }

  /* Hover effect */
  td:hover {
    background: black !important;
    color: white;
    transform: scale(1.1);
    transition: 0.2s;
  }

</style>
</head>
<body>

<h1>Multiplication Table (1–12)</h1>

<table id="table"></table>

<script>
let table = document.getElementById("table");

for (let i = 0; i <= 12; i++) {
  let row = document.createElement("tr");

  for (let j = 0; j <= 12; j++) {
    let cell = document.createElement(i === 0 || j === 0 ? "th" : "td");

    if (i === 0 && j === 0) {
      cell.innerHTML = "X";
    } 
    else if (i === 0) {
      cell.innerHTML = j;
    } 
    else if (j === 0) {
      cell.innerHTML = i;
    } 
    else {
      let val = i * j;
      cell.innerHTML = val;

      // Row color
      cell.classList.add("r" + i);

      // Diagonal highlight
      if (i === j) {
        cell.classList.add("diag");
      }
    }

    row.appendChild(cell);
  }

  table.appendChild(row);
}
</script>

</body>
</html>
