<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hotel Landing Page</title>
<link rel="stylesheet" href="day10.css">
</head>
<body>

<!-- Navbar -->
<nav class="navbar">
    <h2 class="logo">HOTEL MIRANDA</h2>
    <ul>
        <li>Home</li>
        <li>About</li>
        <li>Rooms</li>
        <li>Contact</li>
    </ul>
</nav>

<!-- Hero -->
<section class="hero">
    <h1>The Perfect Base For You</h1>
    <button>Explore</button>
</section>

<!-- About -->
<section class="about">
    <div class="about-text">
        <h2>Discover Our Underground</h2>
        <p>Luxury rooms and peaceful environment.</p>
    </div>
    <div class="about-img"></div>
</section>

<!-- Rooms -->
<section class="rooms">
    <h2>Hand Picked Rooms</h2>
    <div class="room-grid">
        <div class="room"></div>
        <div class="room"></div>
        <div class="room"></div>
    </div>
</section>

<!-- Features -->
<section class="features">
    <h2>Core Features</h2>
    <div class="feature-grid">
        <div class="feature">Free WiFi</div>
        <div class="feature">Parking</div>
        <div class="feature">Room Service</div>
        <div class="feature">Breakfast</div>
    </div>
</section>

<!-- Stats -->
<section class="stats">
    <div>84K+</div>
    <div>10M+</div>
    <div>02K+</div>
    <div>100M+</div>
</section>

<!-- Footer -->
<footer>
    <p>© 2026 Hotel Miranda</p>
</footer>

</body>
</html>
